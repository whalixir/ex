<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پورتفولیو بورس</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent-tsetmc: #00d4aa;
    --accent-dfm: #f59e0b;
    --text: #e8eaf6;
    --text-muted: #7c82a8;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 12px;
    --font: 'Vazirmatn', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .header p { color: var(--text-muted); font-size: 0.9rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 6px;
    border-radius: var(--radius);
    max-width: 400px;
    margin-inline: auto;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active-tsetmc { background: var(--accent-tsetmc); color: #0f1117; }
  .tab-btn.active-dfm    { background: var(--accent-dfm);    color: #0f1117; }

  /* ── Stats Row ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
  .stat-card .value { font-size: 1.3rem; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red   { color: var(--red); }
  .stat-card .value.accent-t { color: var(--accent-tsetmc); }
  .stat-card .value.accent-d { color: var(--accent-dfm); }

  /* ── Chart ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-card h3 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }

  /* ── Form ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .form-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .field label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent-tsetmc); }
  .field textarea { resize: vertical; min-height: 60px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary-t { background: var(--accent-tsetmc); color: #0f1117; }
  .btn-primary-d { background: var(--accent-dfm);    color: #0f1117; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ── Table ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.95rem;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--surface2);
    padding: 12px 16px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 500;
    text-align: right;
  }
  td {
    padding: 12px 16px;
    font-size: 0.875rem;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red   { background: rgba(239,68,68,0.15);  color: var(--red); }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 0.75rem;
    cursor: pointer;
    margin-right: 4px;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: var(--red); color: var(--red); }
  .action-btn.edit:hover { border-color: var(--accent-tsetmc); color: var(--accent-tsetmc); }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.875rem;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 0.875rem;
    transition: transform 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    td, th { padding: 10px 10px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📈 پورتفولیو بورس</h1>
  <p>مدیریت سرمایه‌گذاری در بورس تهران و دبی</p>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active-tsetmc" id="tab-tsetmc" onclick="switchTab('tsetmc')">بورس تهران</button>
  <button class="tab-btn" id="tab-dfm" onclick="switchTab('dfm')">بورس دبی</button>
</div>

<!-- Stats -->
<div class="stats" id="stats-row">
  <div class="stat-card"><div class="label">ارزش فعلی پورتفولیو</div><div class="value accent-t" id="stat-portfolio">—</div></div>
  <div class="stat-card"><div class="label">کل واریز</div><div class="value" id="stat-deposit">—</div></div>
  <div class="stat-card"><div class="label">کل برداشت</div><div class="value" id="stat-withdraw">—</div></div>
  <div class="stat-card"><div class="label">سود / زیان</div><div class="value" id="stat-pnl">—</div></div>
  <div class="stat-card"><div class="label">بازده کل</div><div class="value" id="stat-pct">—</div></div>
</div>

<!-- Chart -->
<div class="chart-card">
  <h3>روند پورتفولیو</h3>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>

<!-- Form -->
<div class="form-card">
  <h3 id="form-title">➕ ثبت رکورد جدید</h3>
  <input type="hidden" id="edit-id">
  <div class="form-grid">
    <div class="field">
      <label>تاریخ</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>ارزش پورتفولیو</label>
      <input type="number" id="f-portfolio" placeholder="مثلاً 5000000">
    </div>
    <div class="field">
      <label>واریز</label>
      <input type="number" id="f-deposit" placeholder="0">
    </div>
    <div class="field">
      <label>برداشت</label>
      <input type="number" id="f-withdraw" placeholder="0">
    </div>
  </div>
  <div class="field" style="margin-bottom:12px">
    <label>یادداشت</label>
    <textarea id="f-note" placeholder="اختیاری..."></textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary-t" id="save-btn" onclick="saveRecord()">ذخیره</button>
    <button class="btn btn-ghost" onclick="clearForm()">پاک کردن</button>
  </div>
</div>

<!-- Table -->
<div class="table-card">
  <div class="table-header" id="table-title">📋 تاریخچه — بورس تهران</div>
  <div id="table-body"><div class="loading">در حال بارگذاری...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Config ──────────────────────────────────────────────────
  const API_BASE = 'https://whalixir.pages.dev';

  let activeTab = 'tsetmc';
  let data = { tsetmc: [], dfm: [] };
  let chartInstance = null;

  // ── Init ────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    setToday();
    loadData('tsetmc');
    loadData('dfm');
  });

  function setToday() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('f-date').value = today;
  }

  // ── Tab Switch ──────────────────────────────────────────────
  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-tsetmc').className = 'tab-btn' + (tab==='tsetmc' ? ' active-tsetmc' : '');
    document.getElementById('tab-dfm').className    = 'tab-btn' + (tab==='dfm'    ? ' active-dfm'    : '');
    document.getElementById('save-btn').className   = 'btn btn-primary-' + (tab==='tsetmc' ? 't' : 'd');
    document.getElementById('table-title').textContent = '📋 تاریخچه — ' + (tab==='tsetmc' ? 'بورس تهران' : 'بورس دبی');
    clearForm();
    renderAll();
  }

  // ── API ─────────────────────────────────────────────────────
  async function loadData(market) {
    try {
      const res = await fetch(`${API_BASE}/api/bours/${market}`);
      if (!res.ok) throw new Error(res.status);
      data[market] = await res.json();
    } catch(e) {
      data[market] = [];
      console.error('خطا در بارگذاری', market, e);
    }
    if (market === activeTab) renderAll();
  }

  async function saveRecord() {
    const id       = document.getElementById('edit-id').value;
    const date     = document.getElementById('f-date').value;
    const portfolio= parseFloat(document.getElementById('f-portfolio').value);
    const deposit  = parseFloat(document.getElementById('f-deposit').value)  || 0;
    const withdraw = parseFloat(document.getElementById('f-withdraw').value) || 0;
    const note     = document.getElementById('f-note').value.trim();

    if (!date || isNaN(portfolio)) { showToast('⚠️ تاریخ و ارزش پورتفولیو الزامی است'); return; }

    const body = {
      date, portfolio, deposit, withdraw, note,
      created_at: Date.now()
    };
    if (id) body.id = parseInt(id);

    try {
      const res = await fetch(`${API_BASE}/api/bours/${activeTab}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(res.status);
      showToast('✅ ذخیره شد');
      clearForm();
      await loadData(activeTab);
    } catch(e) {
      showToast('❌ خطا در ذخیره: ' + e.message);
    }
  }

  async function deleteRecord(id) {
    if (!confirm('حذف شود؟')) return;
    try {
      const res = await fetch(`${API_BASE}/api/bours/${activeTab}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(res.status);
      showToast('🗑️ حذف شد');
      await loadData(activeTab);
    } catch(e) {
      showToast('❌ خطا در حذف');
    }
  }

  function editRecord(id) {
    const row = data[activeTab].find(r => r.id === id);
    if (!row) return;
    document.getElementById('edit-id').value        = row.id;
    document.getElementById('f-date').value         = row.date;
    document.getElementById('f-portfolio').value    = row.portfolio;
    document.getElementById('f-deposit').value      = row.deposit || 0;
    document.getElementById('f-withdraw').value     = row.withdraw || 0;
    document.getElementById('f-note').value         = row.note || '';
    document.getElementById('form-title').textContent = '✏️ ویرایش رکورد';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function clearForm() {
    document.getElementById('edit-id').value     = '';
    document.getElementById('f-portfolio').value = '';
    document.getElementById('f-deposit').value   = '';
    document.getElementById('f-withdraw').value  = '';
    document.getElementById('f-note').value      = '';
    document.getElementById('form-title').textContent = '➕ ثبت رکورد جدید';
    setToday();
  }

  // ── Render ──────────────────────────────────────────────────
  function renderAll() {
    const rows = data[activeTab] || [];
    renderStats(rows);
    renderChart(rows);
    renderTable(rows);
  }

  function fmt(n) {
    if (n == null) return '—';
    return Number(n).toLocaleString('fa-IR');
  }

  function renderStats(rows) {
    if (!rows.length) {
      ['stat-portfolio','stat-deposit','stat-withdraw','stat-pnl','stat-pct'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
      return;
    }
    const last = rows[rows.length - 1];
    const totalDeposit  = rows.reduce((s,r) => s + (r.deposit  || 0), 0);
    const totalWithdraw = rows.reduce((s,r) => s + (r.withdraw || 0), 0);
    const netInvested   = totalDeposit - totalWithdraw;
    const pnl           = last.portfolio - netInvested;
    const pct           = netInvested > 0 ? ((pnl / netInvested) * 100).toFixed(1) : 0;
    const accentClass   = activeTab === 'tsetmc' ? 'accent-t' : 'accent-d';

    const pEl = document.getElementById('stat-portfolio');
    pEl.textContent = fmt(last.portfolio);
    pEl.className = 'value ' + accentClass;

    document.getElementById('stat-deposit').textContent  = fmt(totalDeposit);
    document.getElementById('stat-withdraw').textContent = fmt(totalWithdraw);

    const pnlEl = document.getElementById('stat-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl);
    pnlEl.className = 'value ' + (pnl >= 0 ? 'green' : 'red');

    const pctEl = document.getElementById('stat-pct');
    pctEl.textContent = (pct >= 0 ? '+' : '') + pct + '%';
    pctEl.className = 'value ' + (pct >= 0 ? 'green' : 'red');
  }

  function renderChart(rows) {
    const accent = activeTab === 'tsetmc' ? '#00d4aa' : '#f59e0b';
    const labels = rows.map(r => r.date);
    const values = rows.map(r => r.portfolio);

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('chart').getContext('2d');

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'پورتفولیو',
          data: values,
          borderColor: accent,
          backgroundColor: accent + '20',
          borderWidth: 2.5,
          fill: true,
          tension: 0.35,
          pointBackgroundColor: accent,
          pointRadius: 4,
          pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + Number(ctx.raw).toLocaleString('fa-IR')
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#7c82a8', font: { family: 'Vazirmatn', size: 11 } },
            grid: { color: '#2e3250' }
          },
          y: {
            ticks: {
              color: '#7c82a8',
              font: { family: 'Vazirmatn', size: 11 },
              callback: v => Number(v).toLocaleString('fa-IR')
            },
            grid: { color: '#2e3250' }
          }
        }
      }
    });
  }

  function renderTable(rows) {
    const wrap = document.getElementById('table-body');
    if (!rows.length) {
      wrap.innerHTML = '<div class="empty">هنوز رکوردی ثبت نشده</div>';
      return;
    }

    // محاسبه سود/زیان هر ردیف نسبت به ردیف قبل
    const html = `
      <table>
        <thead>
          <tr>
            <th>تاریخ</th>
            <th>پورتفولیو</th>
            <th>واریز</th>
            <th>برداشت</th>
            <th>تغییر</th>
            <th>یادداشت</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${[...rows].reverse().map((r, i, arr) => {
            const prev = arr[i + 1];
            let change = '';
            if (prev) {
              const diff = r.portfolio - prev.portfolio;
              const pct  = prev.portfolio > 0 ? ((diff / prev.portfolio) * 100).toFixed(1) : 0;
              change = `<span class="badge ${diff >= 0 ? 'badge-green' : 'badge-red'}">${diff >= 0 ? '+' : ''}${pct}%</span>`;
            }
            return `<tr>
              <td>${r.date}</td>
              <td><strong>${fmt(r.portfolio)}</strong></td>
              <td>${r.deposit  ? fmt(r.deposit)  : '—'}</td>
              <td>${r.withdraw ? fmt(r.withdraw) : '—'}</td>
              <td>${change}</td>
              <td style="color:var(--text-muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note || '—'}</td>
              <td>
                <button class="action-btn edit" onclick="editRecord(${r.id})">ویرایش</button>
                <button class="action-btn"      onclick="deleteRecord(${r.id})">حذف</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    wrap.innerHTML = html;
  }

  // ── Toast ───────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
